      <path d="M 60 400 L 150 260 L 240 360 L 350 200 L 450 120" fill="none" stroke="black" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="60" cy="400" r="32" fill="black" />
      <circle cx="150" cy="260" r="32" fill="black" />
      <circle cx="240" cy="360" r="32" fill="black" />
      <circle cx="350" cy="200" r="32" fill="black" />
      <circle cx="450" cy="120" r="32" fill="black" />
