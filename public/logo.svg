    <rect x="36" y="220" width="48" height="240" rx="8" />
    <rect x="126" y="100" width="48" height="360" rx="8" />
    <rect x="216" y="180" width="48" height="280" rx="8" />
    <rect x="326" y="80" width="48" height="380" rx="8" />
    <rect x="426" y="160" width="48" height="300" rx="8" />
  </g>
  
  <!-- Line Foreground -->
  <path d="M 60 400 L 150 260 L 240 360 L 350 200 L 450 120" fill="none" stroke="#3b82f6" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Dots Foreground -->
  <g fill="#3b82f6">
    <circle cx="60" cy="400" r="24" />
    <circle cx="150" cy="260" r="24" />
    <circle cx="240" cy="360" r="24" />
    <circle cx="350" cy="200" r="24" />
    <circle cx="450" cy="120" r="24" />
